<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tlapia Clothing - Store</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header"></div>

  <main>
    <h1>Our Products</h1>
    <div class="sort-bar">
        <label for="sort">Sort by Price:</label>
        <select id="sort">
          <option value="low-high">Low to High</option>
          <option value="high-low">High to Low</option>
        </select>
      </div>

    <div class="product-grid">
      <!-- Example Product -->
      <div class="product-card">
        <img src="assets/images/jersey.jpg" alt="YATI Jersey">
        <h3>YATI Jersey</h3>
        <p>₦15,000</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="assets/images/hoodie.jpg" alt="YATI Hoodie">
        <h3>YATI Hoodie</h3>
        <p>₦20,000</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="assets/images/essentials.jpg" alt="YATI Essentials">
        <h3>YATI Essentials Pack</h3>
        <p>₦10,000</p>
        <button>Add to Cart</button>
      </div>
    </div>
  </main>

  <div id="footer"></div>
  <script src="assets/js/script.js"></script>
</body>
</html>
