<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Tlapia Clothing</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header"></div>

  <main>
    <h1>Our Products</h1>

    <!-- Sorting dropdown -->
    <label for="sort">Sort by:</label>
    <select id="sort">
      <option value="low-high">Price: Low to High</option>
      <option value="high-low">Price: High to Low</option>
    </select>

    <!-- Product grid -->
    <section class="product-grid">
      <div class="product-card">
        <img src="assets/images/product1.jpg" alt="YATIGHANA Jersey">
        <h3>YATIGHANA Jersey</h3>
        <p>₦80,000.00</p>
        <button>Add to Cart</button>
        <button>Add to Favorites</button>

      </div>

      <div class="product-card">
        <img src="assets/images/product2.jpg" alt="YATIBrazil Jersey">
        <h3>YATIBrazil Jersey</h3>
        <p>₦100,000.00</p>
        <button>Add to Cart</button>
        <button>Add to Favorites</button>

      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="assets/js/script.js"></script>
</body>
</html>
