<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tlapia Clothing - Checkout</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
  <div id="header"></div>

  <main>
    <h1>Checkout</h1>

    <!-- Order Summary -->
    <section id="order-summary">
      <h2>Your Order</h2>
      <!-- Cart items will be injected here by script.js -->
    </section>

    <!-- Payment Options -->
    <section id="payment-options">
      <h2>Choose Payment Method</h2>
      <label>
        <input type="radio" name="payment" value="delivery" checked>
        Pay on Delivery
      </label>
      <label>
        <input type="radio" name="payment" value="card">
        Card Payment (Simulation)
      </label>
    </section>
  </main>

       <!-- Place Order Button -->
    <div><button id="placeOrderBtn">Place Order</button></div>

  
  <div id="footer"></div>
  <script src="assets/js/script.js"></script>
</body>
</html>
